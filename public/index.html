<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProAuth - Unique Authentication</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 1;
        }

        .form-icon {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-icon i {
            font-size: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 45px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 40px rgba(102, 126, 234, 0.15);
            display: none;
            animation: slideIn 0.5s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .auth-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .auth-container:hover::before {
            left: 100%;
        }

        .auth-container.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-container h2 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group .input-wrapper {
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #f8f9fa;
            font-weight: 500;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 40px;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .password-toggle:hover {
            color: #667eea;
        }

        .form-group input:valid {
            border-color: #4caf50;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .toggle-auth {
            text-align: center;
            margin-top: 24px;
            color: #888;
            font-size: 14px;
        }

        .toggle-auth button {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s;
            font-size: 14px;
        }

        .toggle-auth button:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .alert {
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: none;
            animation: slideDown 0.4s ease-out;
            border-left: 4px solid;
            font-weight: 500;
            font-size: 14px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border-left-color: #28a745;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border-left-color: #dc3545;
        }

        .dashboard {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 45px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 40px rgba(102, 126, 234, 0.15);
            display: none;
            animation: slideIn 0.5s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dashboard.active {
            display: block;
        }

        .dashboard h2 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-info {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            padding: 24px;
            border-radius: 15px;
            margin-bottom: 30px;
            border-left: 4px solid #667eea;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }

        .user-info p {
            margin-bottom: 12px;
            color: #555;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-info p i {
            color: #667eea;
            width: 20px;
        }

        .user-info strong {
            color: #333;
            font-weight: 700;
        }

        .dashboard-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-secondary {
            flex: 1;
            min-width: 150px;
            background: #f0f0f0;
            color: #333;
            padding: 12px;
            font-size: 14px;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            border-color: #667eea;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
        }

        .btn-danger:hover {
            box-shadow: 0 12px 35px rgba(255, 107, 107, 0.5);
        }

        .users-list {
            margin-top: 40px;
        }

        .users-list h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .users-list h3 i {
            color: #667eea;
        }

        .user-item {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #667eea;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .user-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .user-item-info p {
            margin: 6px 0;
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }

        .user-item-info p strong {
            color: #333;
            font-weight: 700;
        }

        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: pulse 0.6s infinite;
            margin-right: 5px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state i {
            font-size: 48px;
            color: #ddd;
            margin-bottom: 15px;
            display: block;
        }

        @media (max-width: 480px) {
            .auth-container,
            .dashboard {
                padding: 30px 20px;
            }

            .auth-container h2 {
                font-size: 24px;
            }

            .dashboard-buttons {
                flex-direction: column;
            }

            .btn-secondary {
                min-width: auto;
            }

            body::before {
                background-size: 30px 30px;
            }
        }
    </style>
</head>
<body>
    <!-- Auth Container -->
    <div class="container">
        <!-- Login Form -->
        <div class="auth-container active" id="loginContainer">
            <div class="form-icon">
                <i class="fas fa-lock-open"></i>
            </div>
            <h2>Welcome Back</h2>
            <p class="subtitle">Login to your account</p>
            <div class="alert" id="loginAlert"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail"><i class="fas fa-envelope"></i> Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="loginEmail" placeholder="Enter your email" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="loginPassword"><i class="fas fa-key"></i> Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>
                        <i class="fas fa-eye password-toggle" onclick="togglePasswordVisibility('loginPassword')"></i>
                    </div>
                </div>
                <button type="submit" class="btn"><i class="fas fa-sign-in-alt"></i> Login Now</button>
            </form>
            <div class="toggle-auth">
                Don't have an account? <button type="button" onclick="toggleAuth()"><i class="fas fa-user-plus"></i> Register</button>
            </div>
        </div>

        <!-- Register Form -->
        <div class="auth-container" id="registerContainer">
            <div class="form-icon">
                <i class="fas fa-user-shield"></i>
            </div>
            <h2>Create Account</h2>
            <p class="subtitle">Join our community today</p>
            <div class="alert" id="registerAlert"></div>
            <form id="registerForm">
                <div class="form-group">
                    <label for="registerName"><i class="fas fa-user"></i> Full Name</label>
                    <div class="input-wrapper">
                        <input type="text" id="registerName" placeholder="Enter your full name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="registerEmail"><i class="fas fa-envelope"></i> Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="registerEmail" placeholder="Enter your email" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="registerPassword"><i class="fas fa-key"></i> Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="registerPassword" placeholder="Create a strong password" required>
                        <i class="fas fa-eye password-toggle" onclick="togglePasswordVisibility('registerPassword')"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label for="registerAge"><i class="fas fa-birthday-cake"></i> Age</label>
                    <div class="input-wrapper">
                        <input type="number" id="registerAge" placeholder="Your age" min="0" max="120">
                    </div>
                </div>
                <button type="submit" class="btn"><i class="fas fa-user-check"></i> Register Now</button>
            </form>
            <div class="toggle-auth">
                Already have an account? <button type="button" onclick="toggleAuth()"><i class="fas fa-sign-in-alt"></i> Login</button>
            </div>
        </div>

        <!-- Dashboard -->
        <div class="dashboard" id="dashboard">
            <h2><i class="fas fa-tachometer-alt"></i> Dashboard</h2>
            <div class="user-info">
                <p><i class="fas fa-user-circle"></i><strong>Name:</strong> <span id="dashboardName">-</span></p>
                <p><i class="fas fa-envelope"></i><strong>Email:</strong> <span id="dashboardEmail">-</span></p>
                <p><i class="fas fa-birthday-cake"></i><strong>Age:</strong> <span id="dashboardAge">-</span></p>
            </div>
            <div class="dashboard-buttons">
                <button class="btn" onclick="loadAllUsers()"><i class="fas fa-users"></i> View All Users</button>
                <button class="btn btn-secondary" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
            <div class="users-list" id="usersListContainer" style="display:none;">
                <h3><i class="fas fa-list"></i> Registered Users</h3>
                <div id="usersList"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        // Toggle password visibility
        function togglePasswordVisibility(fieldId) {
            const field = document.getElementById(fieldId);
            const icon = event.target;
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Toggle between login and register
        function toggleAuth() {
            document.getElementById('loginContainer').classList.toggle('active');
            document.getElementById('registerContainer').classList.toggle('active');
        }

        // Show alert
        function showAlert(containerId, message, type) {
            const alertElement = document.getElementById(containerId);
            alertElement.textContent = message;
            alertElement.className = `alert show alert-${type}`;
            setTimeout(() => {
                alertElement.classList.remove('show');
            }, 5000);
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showDashboard(data.user);
                    showAlert('loginAlert', '✅ Login successful! Welcome back!', 'success');
                } else {
                    showAlert('loginAlert', '❌ ' + (data.error || 'Login failed'), 'error');
                }
            } catch (error) {
                showAlert('loginAlert', '❌ Error: ' + error.message, 'error');
            }
        });

        // Register
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const age = document.getElementById('registerAge').value || 0;

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, age })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showDashboard(data.user);
                    showAlert('registerAlert', '✅ Registration successful! Welcome!', 'success');
                } else {
                    showAlert('registerAlert', '❌ ' + (data.error || 'Registration failed'), 'error');
                }
            } catch (error) {
                showAlert('registerAlert', '❌ Error: ' + error.message, 'error');
            }
        });

        // Show Dashboard
        function showDashboard(user) {
            document.getElementById('loginContainer').classList.remove('active');
            document.getElementById('registerContainer').classList.remove('active');
            document.getElementById('dashboard').classList.add('active');
            
            document.getElementById('dashboardName').textContent = user.name;
            document.getElementById('dashboardEmail').textContent = user.email;
            document.getElementById('dashboardAge').textContent = user.age || '-';
        }

        // Load all users
        async function loadAllUsers() {
            const token = localStorage.getItem('token');
            const container = document.getElementById('usersListContainer');
            const usersList = document.getElementById('usersList');

            try {
                usersList.innerHTML = '<div class="empty-state"><div class="loading"></div>Loading users...</div>';
                const response = await fetch(`${API_URL}/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const users = await response.json();

                if (response.ok) {
                    if (users.length === 0) {
                        usersList.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>No users found</p></div>';
                    } else {
                        usersList.innerHTML = users.map((user, index) => `
                            <div class="user-item">
                                <div class="user-item-info">
                                    <p><strong>#${index + 1} - ${user.name}</strong></p>
                                    <p><i class="fas fa-envelope"></i> ${user.email}</p>
                                    <p><i class="fas fa-birthday-cake"></i> Age: ${user.age || '-'}</p>
                                </div>
                            </div>
                        `).join('');
                    }
                    container.style.display = 'block';
                } else {
                    usersList.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Error loading users</p></div>';
                }
            } catch (error) {
                usersList.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error: ' + error.message + '</p></div>';
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('loginContainer').classList.add('active');
            document.getElementById('registerForm').reset();
            document.getElementById('loginForm').reset();
            document.getElementById('usersListContainer').style.display = 'none';
            showAlert('loginAlert', '✅ Logged out successfully!', 'success');
        }

        // Check if already logged in on page load
        window.addEventListener('load', () => {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            if (token && user) {
                showDashboard(JSON.parse(user));
            }
        });
    </script>
</body>
</html>
